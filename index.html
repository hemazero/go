<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GameOver - تحدي الأسئلة</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800;900&display=swap');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --primary: #2D1B69;
            --primary-light: #4A2D8A;
            --accent: #FFD700;
            --team1: #3498DB;
            --team2: #E74C3C;
            --success: #2ECC71;
            --lifeline: #6c5ce7;
            --lifeline-light: #a29bfe;
            --timer-warn: #e74c3c;
            --bg1: #0f0c29;
            --bg2: #1a0a3e;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, var(--bg1), var(--bg2));
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            margin: auto;
        }

        h1.logo {
            font-size: 3rem;
            font-weight: 900;
            text-align: center;
            margin-bottom: 25px;
            background: linear-gradient(45deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* الشاشات */
        .screen { display: none; width: 100%; }
        .screen.active { display: block; animation: fadeIn 0.4s ease-in-out; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            margin-bottom: 20px;
            text-align: center;
        }

        h2 { font-size: 1.5rem; margin-bottom: 20px; color: #f1f2f6; }

        /* أزرار الحزم */
        .pack-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn-pack {
            background: linear-gradient(135deg, #3a1c71, #d76d77);
            border: none; color: white; padding: 15px; font-size: 1.1rem;
            font-weight: bold; border-radius: 12px; cursor: pointer;
            transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .btn-pack:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }

        /* كروت الفئات */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .cat-card {
            background: rgba(255,255,255,0.05);
            border: 2px solid var(--glass-border);
            border-radius: 15px; padding: 20px; cursor: pointer;
            text-align: center; font-weight: bold; font-size: 1.1rem;
            transition: all 0.25s ease; transition-property: transform, border-color, background-color;
        }
        .cat-card:hover { transform: translateY(-3px); background: rgba(255,255,255,0.1); }
        .cat-card.selected {
            border-color: var(--accent); background: linear-gradient(135deg, var(--primary-light), var(--primary));
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        .btn-main {
            background: linear-gradient(135deg, #00b894, #00cec9);
            border: none; color: white; padding: 14px 40px; font-size: 1.2rem;
            font-weight: 800; border-radius: 30px; cursor: pointer; margin-top: 25px;
            transition: all 0.3s ease; box-shadow: 0 5px 15px rgba(0,184,148,0.3);
        }
        .btn-main:hover { transform: scale(1.05); box-shadow: 0 8px 25px rgba(0,184,148,0.5); }
        .btn-main:disabled { background: #636e72; cursor: not-allowed; transform: none; box-shadow: none; }

        /* لوحة اللعب وجدول النقاط */
        .game-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; flex-wrap: wrap; gap: 15px;
        }

        .turn-display {
            background: var(--glass-bg); padding: 10px 25px; border-radius: 30px;
            font-size: 1.3rem; font-weight: bold; border: 1px solid var(--glass-border);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); width: 100%; text-align: center;
        }
        .turn-team1 { color: var(--team1); border-color: var(--team1); }
        .turn-team2 { color: var(--team2); border-color: var(--team2); }

        .score-board {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%;
        }
        .score-card {
            background: var(--glass-bg); padding: 15px; border-radius: 15px;
            text-align: center; border: 1px solid var(--glass-border);
        }
        .score-card.t1 { border-left: 5px solid var(--team1); }
        .score-card.t2 { border-left: 5px solid var(--team2); }
        .score-card h3 { font-size: 1.1rem; margin-bottom: 5px; opacity: 0.9; }
        .score-card .score { font-size: 2rem; font-weight: 900; }

        /* جدول اللعبة الأساسي */
        .board-wrapper { width: 100%; overflow-x: auto; margin-top: 20px; border-radius: 15px; }
        .game-board {
            display: grid; grid-template-columns: repeat(6, minmax(130px, 1fr)); gap: 12px; min-width: 800px;
        }
        .board-column { display: flex; flex-direction: column; gap: 12px; }
        .board-cat-name {
            background: var(--primary); padding: 15px 5px; text-align: center;
            font-weight: 800; font-size: 1.05rem; border-radius: 10px; min-height: 55px;
            display: flex; align-items: center; justify-content: center; border: 1px solid var(--glass-border);
        }
        .btn-point {
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            color: var(--accent); padding: 20px 0; font-size: 1.4rem; font-weight: 800;
            border-radius: 10px; cursor: pointer; transition: all 0.2s ease;
        }
        .btn-point:hover:not(:disabled) { background: var(--primary-light); transform: scale(1.03); }
        .btn-point:disabled { opacity: 0.25; cursor: not-allowed; color: #b2bec3; }

        /* النافذة المنبثقة للسؤال */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 12, 41, 0.95); display: none; align-items: center;
            justify-content: center; padding: 20px; z-index: 1000;
        }
        .modal.open { display: flex; animation: fadeIn 0.3s ease-out; }
        .modal-content {
            background: #1e1b4b; border: 2px solid var(--glass-border);
            width: 100%; max-width: 650px; border-radius: 25px; padding: 30px;
            position: relative; display: flex; flex-direction: column; min-height: 480px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        /* العداد والمؤشر بالأعلى المنتصف */
        .modal-header-center {
            text-align: center; margin-bottom: 25px;
        }
        .stopwatch { font-size: 1.8rem; font-weight: 800; color: #fff; margin-bottom: 5px; transition: color 0.3s; }
        .stopwatch.warn { color: var(--timer-warn); animation: pulse 1s infinite; }
        .modal-turn-indicator { font-size: 1.2rem; font-weight: bold; color: var(--accent); }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .question-text {
            font-size: 1.6rem; font-weight: 700; text-align: center; margin-bottom: 30px;
            line-height: 1.5; flex-grow: 1; display: flex; align-items: center; justify-content: center;
        }
        .answer-text {
            font-size: 1.5rem; font-weight: 700; text-align: center; color: var(--success);
            margin-bottom: 25px; background: rgba(46, 204, 113, 0.1); padding: 15px;
            border-radius: 12px; border: 1px dashed var(--success); display: none;
        }
        .answer-text.visible { display: block; animation: fadeIn 0.2s; }

        .action-buttons { display: flex; flex-direction: column; gap: 12px; margin-bottom: 60px; }
        .btn-action {
            width: 100%; padding: 14px; font-size: 1.1rem; font-weight: 700; border-radius: 12px;
            border: none; cursor: pointer; transition: all 0.2s;
        }
        .btn-show { background: #ffeaa7; color: #2d3436; }
        .btn-correct { background: var(--success); color: white; display: none; }
        .btn-incorrect { background: #d63031; color: white; display: none; }

        /* وسائل المساعدة في الأسفل المنتصف */
        .lifelines-container {
            position: absolute; bottom: 20px; left: 0; width: 100%;
            display: flex; justify-content: center; gap: 12px; padding: 0 20px;
        }
        .btn-lifeline {
            background: var(--lifeline); color: white; border: none; padding: 10px 16px;
            border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.95rem;
            transition: all 0.2s; box-shadow: 0 4px 10px rgba(108, 92, 231, 0.3);
        }
        .btn-lifeline:hover:not(:disabled) { background: var(--lifeline-light); transform: translateY(-2px); }
        .btn-lifeline:disabled { background: #2d3436; opacity: 0.3; cursor: not-allowed; box-shadow: none; }

        /* شاشة فرعية لمؤقت الاتصال بصديق */
        .friend-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f0c29; border-radius: 23px; display: none;
            flex-direction: column; align-items: center; justify-content: center; z-index: 10;
        }
        .friend-overlay.open { display: flex; }
        .friend-timer { font-size: 4rem; font-weight: 900; color: var(--accent); margin-top: 15px; }

        /* شاشة الفوز */
        .winner-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15,12,41,0.98); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 2000;
        }
        .winner-overlay.open { display: flex; }
        .winner-title { font-size: 3rem; color: var(--accent); font-weight: 900; margin-bottom: 10px; text-align: center;}
        .winner-score { font-size: 1.5rem; margin-bottom: 30px; opacity: 0.8; }

        /* تحسينات الشاشات الصغيرة لجوال */
        @media (max-width: 600px) {
            h1.logo { font-size: 2.2rem; }
            .modal-content { padding: 20px; min-height: 460px; }
            .question-text { font-size: 1.3rem; }
            .btn-lifeline { padding: 8px 12px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1 class="logo">GameOver</h1>

    <div id="pack-screen" class="screen active">
        <div class="card-panel">
            <h2>اختر حزمة الأسئلة لبدء التحدي</h2>
            <div id="pack-grid" class="pack-grid"></div>
        </div>
    </div>

    <div id="setup-screen" class="screen">
        <div class="card-panel">
            <h2 id="setup-title">اختر الفئات (0 من 6)</h2>
            <div id="category-grid" class="category-grid"></div>
            <button id="btn-start-game" class="btn-main" disabled onclick="startGame()">ابدأ اللعب الآن 🎮</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div class="game-header">
            <div id="turn-display" class="turn-display turn-team1">الدور الآن على: الفريق الأول</div>
            <div class="score-board">
                <div class="score-card t1">
                    <h3>الفريق الأول</h3>
                    <div id="score-t1" class="score">0</div>
                </div>
                <div class="score-card t2">
                    <h3>الفريق الثاني</h3>
                    <div id="score-t2" class="score">0</div>
                </div>
            </div>
        </div>

        <div class="board-wrapper">
            <div id="game-board" class="game-board"></div>
        </div>
    </div>
</div>

<div id="question-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header-center">
            <div id="stopwatch" class="stopwatch">00:00</div>
            <div id="modal-turn-text" class="modal-turn-indicator">دور الفريق</div>
        </div>

        <div id="question-text" class="question-text">السؤال يظهر هنا...</div>
        <div id="answer-text" class="answer-text">الإجابة النموذجية</div>

        <div class="action-buttons">
            <button id="btn-show-answer" class="btn-action btn-show" onclick="showAnswer()">إظهار الإجابة 👁️</button>
            <button id="btn-correct" class="btn-action btn-correct" onclick="handleAnswerResult(true)">إجابة صحيحة ✅</button>
            <button id="btn-incorrect" class="btn-action btn-incorrect" onclick="handleAnswerResult(false)">إجابة خاطئة ❌</button>
        </div>

        <div class="lifelines-container">
            <button id="lf-letter" class="btn-lifeline" onclick="useFirstLetter()">أول حرف</button>
            <button id="lf-friend" class="btn-lifeline" onclick="useCallFriend()">اتصال بصديق</button>
            <button id="lf-double" class="btn-lifeline" onclick="useDoublePoints()">دبل النقاط</button>
        </div>

        <div id="friend-overlay" class="friend-overlay">
            <h2>جاري الاتصال بصديق... 📞</h2>
            <div id="friend-timer" class="friend-timer">30</div>
        </div>
    </div>
</div>

<div id="winner-overlay" class="winner-overlay">
    <div class="winner-title">🏆 الفائز بالتحدي 🏆</div>
    <div id="winner-name" class="winner-title" style="color: #fff; font-size: 4rem; margin: 20px 0;">-</div>
    <div id="winner-score" class="winner-score">-</div>
    <button class="btn-main" onclick="location.reload()">لعب جولة جديدة 🔄</button>
</div>

<script>
// ============================================================
// اذكر هنا أسماء ملفات الـ JSON الموجودة في نفس مجلد ملف الـ HTML
// ============================================================
const availablePacks = ['pack1.json']; 

// كينونة إدارة حالة اللعبة الكاملة
let state = {
    categories: [],
    selectedCategories: [],
    gameBoard: {},
    team1: { name: 'الفريق الأول', score: 0, lifelines: { letter: true, friend: true, double: true } },
    team2: { name: 'الفريق الثاني', score: 0, lifelines: { letter: true, friend: true, double: true } },
    currentTurn: 'team1', 
    currentQuestion: null,
    currentPoints: 0,
    currentCatId: null,
    isDoubleActive: false
};

let stopwatchInterval = null;
let stopwatchSeconds = 0;
let friendInterval = null;

// مرجع لعناصر DOM
const dom = {};
function cacheDom() {
    dom.packScreen = document.getElementById('pack-screen');
    dom.setupScreen = document.getElementById('setup-screen');
    dom.gameScreen = document.getElementById('game-screen');
    dom.packGrid = document.getElementById('pack-grid');
    dom.categoryGrid = document.getElementById('category-grid');
    dom.setupTitle = document.getElementById('setup-title');
    dom.btnStartGame = document.getElementById('btn-start-game');
    dom.gameBoard = document.getElementById('game-board');
    dom.turnDisplay = document.getElementById('turn-display');
    dom.scoreT1 = document.getElementById('score-t1');
    dom.scoreT2 = document.getElementById('score-t2');
    dom.questionModal = document.getElementById('question-modal');
    dom.stopwatch = document.getElementById('stopwatch');
    dom.modalTurnText = document.getElementById('modal-turn-text');
    dom.questionText = document.getElementById('question-text');
    dom.answerText = document.getElementById('answer-text');
    dom.btnShowAnswer = document.getElementById('btn-show-answer');
    dom.btnCorrect = document.getElementById('btn-correct');
    dom.btnIncorrect = document.getElementById('btn-incorrect');
    dom.friendOverlay = document.getElementById('friend-overlay');
    dom.friendTimer = document.getElementById('friend-timer');
    dom.winnerOverlay = document.getElementById('winner-overlay');
    dom.winnerName = document.getElementById('winner-name');
    dom.winnerScore = document.getElementById('winner-score');
    
    // أزرار المساعدة
    dom.lfLetter = document.getElementById('lf-letter');
    dom.lfFriend = document.getElementById('lf-friend');
    dom.lfDouble = document.getElementById('lf-double');
}

// بناء وعرض قائمة ملفات الـ JSON المتوفرة وحذف امتدادها مبرمجاً لتظهر كاسم أنيق
function renderPackList() {
    dom.packGrid.innerHTML = '';
    availablePacks.forEach(packFile => {
        const btn = document.createElement('button');
        btn.className = 'btn-pack';
        // حذف امتداد .json تلقائياً وعرض الاسم
        let displayName = packFile.replace('.json', '');
        btn.textContent = displayName;
        btn.onclick = () => fetchPackData(packFile);
        dom.packGrid.appendChild(btn);
    });
}

// جلب بيانات ملف الـ JSON من نفس المجلد الفعلي عبر الـ Fetch API الآمن
function fetchPackData(fileName) {
    // الاتصال بالملف مباشرة في نفس المجلد الفعلي دون مجلدات فرعية لتفادي 404
    fetch('./' + fileName)
        .then(res => {
            if (!res.ok) throw new Error('File not found');
            return res.json();
        })
        .then(data => {
            state.categories = data;
            dom.packScreen.style.display = 'none';
            dom.setupScreen.classList.add('active');
            renderCategoryCards();
        })
        .catch(err => {
            alert('خطأ في تحميل الحزمة: تعذر العثور على الملف: ' + fileName + '\nتأكد من وجود الملف وبنفس الاسم والامتداد في نفس المجلد.');
        });
}

// عرض الفئات المتوفرة على شكل كروت ذكية ومصممة بعناية
function renderCategoryCards() {
    dom.categoryGrid.innerHTML = '';
    state.categories.forEach(cat => {
        const card = document.createElement('div');
        card.className = 'cat-card';
        card.textContent = cat.name;
        card.dataset.id = cat.id;
        
        if (state.selectedCategories.includes(cat.id)) {
            card.classList.add('selected');
        }
        
        card.onclick = () => toggleCategorySelect(cat.id, card);
        dom.categoryGrid.appendChild(card);
    });
    updateSetupTitle();
}

function toggleCategorySelect(catId, cardEl) {
    const index = state.selectedCategories.indexOf(catId);
    if (index > -1) {
        state.selectedCategories.splice(index, 1);
        cardEl.classList.remove('selected');
    } else {
        if (state.selectedCategories.length >= 6) {
            alert('يمكنك اختيار 6 فئات كحد أقصى فقط للعب!');
            return;
        }
        state.selectedCategories.push(catId);
        cardEl.classList.add('selected');
    }
    updateSetupTitle();
}

function updateSetupTitle() {
    let count = state.selectedCategories.length;
    dom.setupTitle.textContent = `اختر الفئات (${count} من 6)`;
    dom.btnStartGame.disabled = (count !== 6);
}

// منطق الـ Cooldown وتوليد اللوحة العشوائية بـ 3 أزرار ثابتة فقط (200، 400، 600) لكل فئة
function buildGameBoard() {
    // تذكر آخر أسئلة تم لعبها عبر الـ localStorage لتفادي تكرارها فوراً
    let history = JSON.parse(localStorage.getItem('GameOver_Memory') || '[]');
    let currentRoundQuestions = [];
    state.gameBoard = {};

    state.selectedCategories.forEach(catId => {
        let catData = state.categories.find(c => c.id === catId);
        state.gameBoard[catId] = {};
        
        ['200', '400', '600'].forEach(points => {
            let pool = (catData.questions && catData.questions[points]) ? catData.questions[points] : [];
            // تصفية الأسئلة السابقة لإحداث "فترة التبريد"
            let filteredPool = pool.filter(q => !history.includes(q.q));
            
            // خطة الحماية والدعم التلقائي: إذا فرغ بنك الأسئلة نقوم بسحب السؤال من البنك العام دون فلترة
            if (filteredPool.length === 0) filteredPool = pool;
            
            if (filteredPool.length > 0) {
                let picked = filteredPool[Math.floor(Math.random() * filteredPool.length)];
                state.gameBoard[catId][points] = picked;
                currentRoundQuestions.push(picked.q);
            } else {
                state.gameBoard[catId][points] = { q: "لم يتم العثور على سؤال لهذا المستوى.", a: "لا توجد إجابة" };
            }
        });
    });

    // تحديث ذاكرة المتصفح بأسئلة الجولة الحالية فقط لتبريدها الشوط القادم
    localStorage.setItem('GameOver_Memory', JSON.stringify(currentRoundQuestions));
}

function startGame() {
    buildGameBoard();
    dom.setupScreen.style.display = 'none';
    dom.gameScreen.classList.add('active');
    renderBoardUI();
    updateTurnDisplay();
}

// رسم لوحة اللعب وعناوين الفئات الستة
function renderBoardUI() {
    dom.gameBoard.innerHTML = '';
    state.selectedCategories.forEach(catId => {
        let catData = state.categories.find(c => c.id === catId);
        
        const col = document.createElement('div');
        col.className = 'board-column';
        
        const titleCard = document.createElement('div');
        titleCard.className = 'board-cat-name';
        titleCard.textContent = catData.name;
        col.appendChild(titleCard);
        
        ['200', '400', '600'].forEach(points => {
            const btn = document.createElement('button');
            btn.className = 'btn-point';
            btn.textContent = points;
            btn.id = `btn-${catId}-${points}`;
            btn.onclick = () => openQuestion(catId, points);
            col.appendChild(btn);
        });
        
        dom.gameBoard.appendChild(col);
    });
}

function updateTurnDisplay() {
    let activeTeam = state[state.currentTurn];
    dom.turnDisplay.textContent = `الدور الآن على: ${activeTeam.name}`;
    dom.turnDisplay.className = `turn-display turn-${state.currentTurn}`;
}

// منطق فتح السؤال وبدء عداد التوقيت المستمر
function openQuestion(catId, points) {
    state.currentCatId = catId;
    state.currentPoints = parseInt(points);
    state.currentQuestion = state.gameBoard[catId][points];
    state.isDoubleActive = false;

    dom.questionText.textContent = state.currentQuestion.q;
    dom.answerText.textContent = state.currentQuestion.a;
    dom.answerText.classList.remove('visible');
    
    dom.btnShowAnswer.style.display = 'block';
    dom.btnCorrect.style.display = 'none';
    dom.btnIncorrect.style.display = 'none';
    
    let activeTeam = state[state.currentTurn];
    dom.modalTurnText.textContent = `اللاعب الحالي: ${activeTeam.name}`;
    
    // تهيئة وتحديث أزرار المساعدة طبقاً لاستهلاك الفريق الحالي لها
    updateLifelineButtonsUI(activeTeam);
    
    // تشغيل عداد الوقت التصاعدي
    stopwatchSeconds = 0;
    dom.stopwatch.textContent = "00:00";
    dom.stopwatch.classList.remove('warn');
    clearInterval(stopwatchInterval);
    stopwatchInterval = setInterval(updateStopwatch, 1000);

    dom.questionModal.classList.add('open');
}

// تحديث الواجهة الخاصة بأزرار وسائل المساعدة
function updateLifelineButtonsUI(team) {
    dom.lfLetter.disabled = !team.lifelines.letter;
    dom.lfFriend.disabled = !team.lifelines.friend;
    dom.lfDouble.disabled = !team.lifelines.double;
}

// منطق عداد الوقت التصاعدي المستمر
function updateStopwatch() {
    stopwatchSeconds++;
    let mins = Math.floor(stopwatchSeconds / 60);
    let secs = stopwatchSeconds % 60;
    
    let displayMins = mins < 10 ? '0' + mins : mins;
    let displaySecs = secs < 10 ? '0' + secs : secs;
    
    dom.stopwatch.textContent = `${displayMins}:${displaySecs}`;
    
    // عند تخطي دقيقة واحدة (60 ثانية) يتحول اللون إلى الأحمر ويكمل عادي
    if (stopwatchSeconds >= 60) {
        dom.stopwatch.classList.add('warn');
    }
}

function showAnswer() {
    dom.answerText.classList.add('visible');
    dom.btnShowAnswer.style.display = 'none';
    dom.btnCorrect.style.display = 'block';
    dom.btnIncorrect.style.display = 'block';
}

function handleAnswerResult(isCorrect) {
    clearInterval(stopwatchInterval);
    
    let scoreChange = state.currentPoints;
    if (state.isDoubleActive) scoreChange *= 2; // مضاعفة النقاط برمجياً إذا تم استهلاك الوسيلة
    
    if (isCorrect) {
        state[state.currentTurn].score += scoreChange;
    }
    
    // تحديث لوحة النتائج المرئية
    dom.scoreT1.textContent = state.team1.score;
    dom.scoreT2.textContent = state.team2.score;
    
    // تعطيل زر النقاط الذي تم الإجابة عليه في لوحة اللعب
    const usedBtn = document.getElementById(`btn-${state.currentCatId}-${state.currentPoints}`);
    if (usedBtn) usedBtn.disabled = true;
    
    dom.questionModal.classList.remove('open');
    
    // فحص نهاية الجولة أو تحويل الدور تلقائياً للفريق المنافس
    if (checkAllButtonsDisabled()) {
        endGame();
    } else {
        state.currentTurn = (state.currentTurn === 'team1') ? 'team2' : 'team1';
        updateTurnDisplay();
    }
}

function checkAllButtonsDisabled() {
    const btns = dom.gameBoard.querySelectorAll('.btn-point');
    return Array.from(btns).every(b => b.disabled);
}

// وسائل المساعدة الثلاثة متمركزة بالأسفل والمنتصف
function useFirstLetter() {
    let currentTeam = state[state.currentTurn];
    if (!currentTeam.lifelines.letter) return;
    
    currentTeam.lifelines.letter = false;
    dom.lfLetter.disabled = true;
    
    let ans = state.currentQuestion.a;
    let firstChar = ans ? ans.trim().charAt(0) : '-';
    alert(`الحرف الأول من الإجابة هو: ( ${firstChar} )`);
}

function useCallFriend() {
    let currentTeam = state[state.currentTurn];
    if (!currentTeam.lifelines.friend) return;
    
    currentTeam.lifelines.friend = false;
    dom.lfFriend.disabled = true;
    
    dom.friendOverlay.classList.add('open');
    let timeLeft = 30;
    dom.friendTimer.textContent = timeLeft;
    
    clearInterval(friendInterval);
    friendInterval = setInterval(() => {
        timeLeft--;
        dom.friendTimer.textContent = timeLeft;
        if (timeLeft <= 0) {
            clearInterval(friendInterval);
            dom.friendOverlay.classList.remove('open');
        }
    }, 1000);
}

function useDoublePoints() {
    let currentTeam = state[state.currentTurn];
    if (!currentTeam.lifelines.double) return;
    
    currentTeam.lifelines.double = false;
    dom.lfDouble.disabled = true;
    
    state.isDoubleActive = true;
    alert('🔥 تم تفعيل دبل النقاط! هذه المحاولة تساوي ضعف القيمة الأصلية للسؤال.');
}

function endGame() {
    let s1 = state.team1.score;
    let s2 = state.team2.score;
    let winnerText = "";
    
    if (s1 > s2) {
        winnerText = state.team1.name;
    } else if (s2 > s1) {
        winnerText = state.team2.name;
    } else {
        winnerText = "تعادل الفريقين! 🤝";
    }
    
    dom.winnerName.textContent = winnerText;
    dom.winnerScore.textContent = `${state.team1.name}: ${s1} نقطة | ${state.team2.name}: ${s2} نقطة`;
    dom.winnerOverlay.classList.add('open');
}

// تشغيل وتهيئة الإعدادات الأساسية عند التحميل الكلي للمستند
function initGameEngine() {
    cacheDom();
    renderPackList();
}

document.addEventListener('DOMContentLoaded', initGameEngine);
</script>
</body>
</html>
